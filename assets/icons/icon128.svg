<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E3A8A" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Shield -->
  <path d="M64 8L16 30v34c0 28 22 52 48 58 26-6 48-30 48-58V30L64 8Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>
  <!-- Left half highlight -->
  <path d="M64 8L16 30v34c0 28 22 52 48 58V8Z" fill="white" opacity="0.08"/>
  <!-- Inner shield border -->
  <path d="M64 14L20 33v31c0 25.5 20 47.5 44 53V14Z" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- Checkmark -->
